name: Firebase Hosting

# Builds the Expo web export and deploys it to Firebase Hosting.
# - Pull requests -> a temporary Firebase preview channel.
# - Pushes to main -> the live site.
#
# Project id is pinned below (and in .firebaserc). Requires one repository secret:
#   FIREBASE_SERVICE_ACCOUNT_PIZZA_APP_36305  - service account JSON (created by
#                               `firebase init hosting:github`).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
      - run: npm run export:web
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PIZZA_APP_36305 }}
          projectId: pizza-app-36305

  build_and_deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
      - run: npm run export:web
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PIZZA_APP_36305 }}
          projectId: pizza-app-36305
          channelId: live
